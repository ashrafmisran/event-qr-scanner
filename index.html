<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>

<body style="text-align:center;font-family:sans-serif">

  <h2>Hi-Tea Scanner</h2>

  <button onclick="startScanner()" style="padding:10px 20px;font-size:16px">
    Scan QR
  </button>

  <div id="reader" style="width:300px;margin:20px auto;display:none;"></div>

  <h2 id="result"></h2>

  <button id="scanAgainBtn" onclick="resetScanner()" 
    style="display:none;padding:10px 20px;font-size:16px">
    Scan Other
  </button>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbz4ShR2Rff10StsCBGvY-AFmkuYhiCYgWuVNZI62WfWJfibitLxAJ098scbYh93nfotLQ/exec";
    let scanner;

    function show(text, color) {
      let el = document.getElementById("result");
      el.innerText = text;
      el.style.color = color;
    }

    function startScanner() {
      document.getElementById("reader").style.display = "block";
      document.getElementById("result").innerText = "";
      document.getElementById("scanAgainBtn").style.display = "none";

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    }

    function onScanSuccess(decodedText) {

      scanner.stop(); // stop camera immediately

      let url = decodedText;

      if (!decodedText.startsWith("http")) {
        url = BASE_URL + "?id=" + decodedText;
      }

      fetch(url)
        .then(res => res.text())
        .then(result => {

          let parts = result.split("|");

          if (parts[0] === "OK") {
            show("WELCOME " + parts[1] + " (" + parts[2] + " pax)", "green");
          } 
          else if (parts[0] === "ALREADY") {
            show("ALREADY CHECKED: " + parts[1], "orange");
          } 
          else {
            show("INVALID QR", "red");
          }

          document.getElementById("scanAgainBtn").style.display = "inline-block";
        });
    }

    function resetScanner() {
      document.getElementById("reader").style.display = "none";
      document.getElementById("result").innerText = "";
      document.getElementById("scanAgainBtn").style.display = "none";
    }

  </script>

</body>
</html>
