<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="text-align:center;font-family:sans-serif">

  <h2>Hi-Tea Scanner</h2>

  <div id="reader" style="width:300px;margin:20px auto;display:none;"></div>

  <h2 id="status">Ready</h2>

  <button id="actionBtn" onclick="handleAction()" 
    style="padding:12px 24px;font-size:16px">
    Scan QR
  </button>

  <div style="margin-top:30px">

    <div style="display:flex;justify-content:center;gap:20px">
      
      <div style="padding:15px;background:#eee;border-radius:10px">
        <h4>Bilangan Daftar</h4>
        <h2 id="total">0</h2>
      </div>
  
      <div style="padding:15px;background:#eee;border-radius:10px">
        <h4>Sudah Hadir</h4>
        <h2 id="hadir">0</h2>
      </div>
  
    </div>
  
    <div style="width:250px;margin:20px auto">
      <canvas id="chart"></canvas>
    </div>
  
  </div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbz4ShR2Rff10StsCBGvY-AFmkuYhiCYgWuVNZI62WfWJfibitLxAJ098scbYh93nfotLQ/exec";

    let scanner = null;
    let state = "idle"; 
    // idle | scanning | checking | result

    function setUI(text, color, buttonText) {
      document.getElementById("status").innerText = text;
      document.getElementById("status").style.color = color;
      document.getElementById("actionBtn").innerText = buttonText;
    }

    function handleAction() {

      if (state === "idle") {
        startScanner();
      } 
      else if (state === "result") {
        reset();
      }
    }

    function startScanner() {
      state = "scanning";

      document.getElementById("reader").style.display = "block";
      setUI("Scanning...", "black", "Scanning...");

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    }

    function onScanSuccess(decodedText) {

      state = "checking";

      scanner.stop();
      document.getElementById("reader").style.display = "none";

      setUI("Checking...", "blue", "Please wait");

      let url = decodedText;

      if (!decodedText.startsWith("http")) {
        url = BASE_URL + "?id=" + decodedText;
      }

      fetch(url)
        .then(res => res.text())
        .then(result => {

          let parts = result.split("|");

          if (parts[0] === "OK") {
            setUI("WELCOME " + parts[1] + " (" + parts[2] + " pax)", "green", "Scan Again");
          } 
         else if (parts[0] === "ALREADY") {

            let timeText = parts[2] ? " (" + parts[2] + ")" : "";
          
            setUI("ALREADY CHECKED: " + parts[1] + timeText, "orange", "Scan Again");
          }
          else {
            setUI("INVALID QR", "red", "Scan Again");
          }

          state = "result";
        })
        .catch(() => {
          setUI("NETWORK ERROR", "red", "Scan Again");
          state = "result";
        });
      
      loadStats();
    }

    function reset() {
      state = "idle";
      setUI("Ready", "black", "Scan QR");
    }

    let chart;
    
    function loadStats() {
    
      fetch(BASE_URL + "?stats=1")
        .then(res => res.json())
        .then(data => {
    
          document.getElementById("total").innerText = data.total;
          document.getElementById("hadir").innerText = data.hadir;
    
          let belum = data.belum;
    
          if (chart) chart.destroy();
    
          chart = new Chart(document.getElementById("chart"), {
            type: "doughnut",
            data: {
              labels: ["Hadir", "Belum"],
              datasets: [{
                data: [data.hadir, belum]
              }]
            }
          });
    
        });
    }

    loadStats();

  </script>

</body>
</html>
